name: Deploy Frontend (hnix-mate-app) to NCP

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # NCP 및 Nginx 설정과 일치하도록 이름 지정
  IMAGE_NAME: hnix-mate-app
  CONTAINER_NAME: hnix-mate-app
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${OWNER_LC}" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to NCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }} # deploy
          key: ${{ secrets.SERVER_SSH_KEY }}    # lab2_ncp_sshkey
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }} # hnixlab2
          port: ${{ secrets.SERVER_PORT }}    # 22
          envs: IMAGE_NAME, CONTAINER_NAME, IMAGE_TAG, GHCR_PAT
          script: |
            set -euxo pipefail
            # 1. 이미지 정보 설정
            OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            IMAGE="ghcr.io/${OWNER_LC}/${IMAGE_NAME}:${IMAGE_TAG}"
            echo "--- Target Frontend Image: $IMAGE ---"
            # 2. GHCR 로그인 (배포 서버 내부)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            # 3. 최신 이미지 가져오기
            echo "--- Pulling Image ---"
            docker pull "$IMAGE"
            # 4. 기존 컨테이너 교체
            echo "--- Restarting Frontend Container ---"
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true
            # 5. 새 컨테이너 실행 (Portainer 및 Nginx 설정 반영)
            # - 포트: 9140:80
            # - 네트워크: lab-net
            docker run -d \
              --name "$CONTAINER_NAME" \
              --network lab-net \
              -p 9140:80 \
              --restart always \
              "$IMAGE"
            # 6. 결과 확인 및 구버전 이미지 정리
            docker ps -f "name=$CONTAINER_NAME"
            docker image prune -f || true
